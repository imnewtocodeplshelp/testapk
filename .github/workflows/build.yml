name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: ''

      - name: Install Cordova 12
        run: npm install -g cordova@12

      - name: Create www and copy index.html
        run: mkdir -p www && cp index.html www/index.html

      - name: Add cordova-android 13
        run: cordova platform add android@13

      - name: Build debug APK
        run: cordova build android --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ReflexSymphony-debug
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

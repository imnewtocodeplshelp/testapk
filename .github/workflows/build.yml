name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: sdkmanager "build-tools;33.0.2" "platforms;android-33"

      - name: Install Cordova 11
        run: npm install -g cordova@11

      - name: Create www folder and copy index.html
        run: mkdir -p www && cp index.html www/index.html

      - name: Add cordova-android 11
        run: cordova platform add android@11

      - name: Build debug APK
        run: cordova build android --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ReflexSymphony-debug
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

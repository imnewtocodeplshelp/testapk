name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: ''

      - name: Install Gradle 8.7 and override system Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O /tmp/gradle-8.7.zip
          unzip -q /tmp/gradle-8.7.zip -d /opt
          sudo ln -sf /opt/gradle-8.7/bin/gradle /usr/local/bin/gradle
          sudo ln -sf /opt/gradle-8.7/bin/gradle /usr/bin/gradle
          gradle --version

      - name: Install Cordova 12
        run: npm install -g cordova@12

      - name: Create www and copy index.html
        run: mkdir -p www && cp index.html www/index.html

      - name: Add cordova-android 12
        run: cordova platform add android@12

      - name: Force SDK 34 in build.gradle
        run: |
          sed -i 's/compileSdkVersion .*/compileSdkVersion 34/' platforms/android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 34/' platforms/android/app/build.gradle
          sed -i 's/buildToolsVersion .*/buildToolsVersion "34.0.0"/' platforms/android/app/build.gradle

      - name: Build debug APK
        run: cordova build android --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ReflexSymphony-debug
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
